<style>
  :root{
    --saffron:#e07a2c;
    --gold:#c9a227;
    --deep:#1b2a4a;
    --deep2:#26395e;
    --paper:#fbf7ef;
    --card:#ffffff;
    --ink:#22252b;
    --muted:#6b7280;
    --line:#e7e0d2;
    --good:#2f7d5c;
    --danger:#b3452f;
    --radius:16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,var(--deep) 0%, var(--deep) 120px, var(--paper) 120px);
    color:var(--ink); min-height:100%;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);}
  header.topbar{
    padding:18px 18px 14px;color:#fff;
    background:linear-gradient(135deg,var(--deep),var(--deep2));
    position:sticky;top:0;z-index:20;
  }
  header.topbar h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px;}
  header.topbar .sub{font-size:12.5px;opacity:.85;margin-top:3px;}
  main{flex:1;padding:14px 14px calc(90px + var(--safe-bottom));}
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;
    max-width:520px;margin:0 auto;
    display:flex;background:#fff;border-top:1px solid var(--line);
    padding-bottom:var(--safe-bottom);
    box-shadow:0 -4px 16px rgba(0,0,0,.06);
    z-index:30;
  }
  nav.tabs button{
    flex:1;border:none;background:none;padding:9px 2px 8px;font-size:10.5px;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600;
  }
  nav.tabs button .ic{font-size:19px;}
  nav.tabs button.active{color:var(--saffron);}
  h2.section-title{font-size:17px;margin:2px 0 12px;color:var(--deep);}
  .card{background:var(--card);border-radius:var(--radius);padding:14px 15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--line);}
  .pill{display:inline-block;background:#f3ead9;color:var(--saffron);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-right:6px;}
  .pill.green{background:#e4f2ea;color:var(--good);}
  .pill.blue{background:#e6eefc;color:#2454a3;}
  .muted{color:var(--muted);font-size:12.5px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .btn{
    border:none;background:var(--deep);color:#fff;padding:10px 14px;border-radius:12px;font-size:13.5px;font-weight:700;
  }
  .btn.secondary{background:#f0ece1;color:var(--deep);}
  .btn.ghost{background:none;color:var(--saffron);padding:6px 8px;font-weight:700;}
  .btn.small{padding:7px 10px;font-size:12px;}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.block{width:100%;}
  input,select,textarea{
    width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);font-family:inherit;
  }
  textarea{resize:vertical;min-height:60px;}
  label.field{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 4px;}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
  .chip{flex:none;padding:8px 13px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted);}
  .chip.active{background:var(--deep);color:#fff;border-color:var(--deep);}
  .day-card .date{font-size:11.5px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;}
  .day-card h3{margin:2px 0 4px;font-size:15.5px;color:var(--deep);}
  .day-card .loc{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  .day-card p{font-size:13.5px;line-height:1.45;margin:6px 0;}
  .tips{margin:8px 0 0;padding:0;list-style:none;}
  .tips li{font-size:12.5px;line-height:1.4;padding:5px 0 5px 20px;position:relative;color:#3a3d44;}
  .tips li:before{content:"✓";position:absolute;left:0;color:var(--good);font-weight:900;}
  .doc-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--line);}
  .doc-item:first-child{border-top:none;}
  .thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:#eee;flex:none;border:1px solid var(--line);}
  .thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:22px;}
  .doc-info{flex:1;min-width:0;}
  .doc-info .t{font-weight:700;font-size:13.5px;}
  .doc-info .m{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,25,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px 18px calc(22px + var(--safe-bottom));max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 12px;font-size:16.5px;color:var(--deep);}
  .modal-actions{display:flex;gap:8px;margin-top:14px;}
  .modal-actions .btn{flex:1;}
  .close-x{position:absolute;top:10px;right:14px;font-size:20px;background:none;border:none;color:var(--muted);}
  .guide-stop{border-top:1px solid var(--line);padding:12px 0;}
  .guide-stop:first-child{border-top:none;}
  .guide-stop.current{background:#fff7ea;border-radius:10px;padding:12px;margin:0 -12px;}
  .guide-stop h4{margin:0 0 5px;font-size:13.5px;color:var(--deep);}
  .guide-stop p{margin:0;font-size:13px;line-height:1.5;color:#333;}
  .player-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 4px;display:flex;align-items:center;justify-content:center;gap:14px;border-radius:14px;margin-top:10px;box-shadow:0 -2px 10px rgba(0,0,0,.05);}
  .player-bar button{background:var(--deep);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:17px;}
  .player-bar button.big{width:54px;height:54px;font-size:20px;background:var(--saffron);}
  .checklist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px;}
  .checklist-item:first-child{border-top:none;}
  .checklist-item input{width:19px;height:19px;flex:none;}
  .checklist-item.checked span{text-decoration:line-through;color:var(--muted);}
  .info-block h4{margin:14px 0 4px;color:var(--deep);font-size:14px;}
  .info-block p, .info-block li{font-size:13px;line-height:1.5;color:#3a3d44;}
  .info-block ul{margin:4px 0;padding-left:18px;}
  .banner{background:#fff7ea;border:1px solid #f0dcae;border-radius:14px;padding:12px 14px;font-size:12.5px;line-height:1.5;margin-bottom:12px;color:#5a4a1f;}
  .banner b{color:#8a5c0a;}
  .traveler-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .traveler-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;color:var(--deep);}
  .traveler-card .r{font-weight:500;color:var(--muted);font-size:11.5px;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;}
  a{color:var(--saffron);}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#22252b;color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.25);}
</style>
</head>

let _db;
function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db) return resolve(_db);
    const req = indexedDB.open('travelAppPhotosDB', 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore('photos'); };

    req.onerror = e => reject(e);
  });
}
function idbPut(id, blob){ return openDB().then(d=>new Promise((res,rej)=>{ const tx=d.transaction('photos','readwrite'); tx.objectStore('photos').put(blob, id); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); })); }
function idbGet(id){ return openDB().then(d=>new Promise((res,rej)=>{ const tx=d.transaction('photos','readonly'); const rq=tx.objectStore('photos').get(id); rq.onsuccess=()=>res(rq.result); rq.onerror=e=>rej(e); })); }
function idbDelete(id){ return openDB().then(d=>new Promise((res,rej)=>{ const tx=d.transaction('photos','readwrite'); tx.objectStore('photos').delete(id); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e); })); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function resizeImage(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width,height} = img;
        const maxDim = 1400;
        if(width > maxDim || height > maxDim){
          const scale = maxDim / Math.max(width,height);
          width = Math.round(width*scale); height = Math.round(height*scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.75);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function blobToBase64(blob){ return new Promise(res=>{ const r=new FileReader(); r.onloadend=()=>res(r.result); r.readAsDataURL(blob); }); }
function dataURLToBlob(dataurl){
  const parts = dataurl.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  let n = bstr.length; const u8 = new Uint8Array(n);
  while(n--){ u8[n] = bstr.charCodeAt(n); }
  return new Blob([u8], {type:mime});
}

/* ============ DOCS ============ */
let docsTravelerFilter = TRAVELERS[0].id;
let docsCatFilter = DOC_CATEGORIES[0].key;
function renderDocs(main){
  main.innerHTML = `
    <h2 class="section-title">Travel documents</h2>
    <div class="chips" id="travelerChips">${TRAVELERS.map(t=>`<button class="chip ${t.id===docsTravelerFilter?'active':''}" data-t="${t.id}">${t.name}</button>`).join('')}</div>
    <div class="chips" id="catChips">${DOC_CATEGORIES.map(c=>`<button class="chip ${c.key===docsCatFilter?'active':''}" data-c="${c.key}">${c.icon} ${c.label}</button>`).join('')}</div>
    <div class="card" id="docListCard"></div>
    <button class="btn block" id="addDocBtn" style="margin-top:4px;">+ Add ${catInfo(docsCatFilter).label} for ${travelerName(docsTravelerFilter)}</button>
  `;
  document.getElementById('travelerChips').addEventListener('click', e=>{
    const b = e.target.closest('button[data-t]'); if(!b) return;
    docsTravelerFilter = b.dataset.t; renderDocs(main);
  });
  document.getElementById('catChips').addEventListener('click', e=>{
    const b = e.target.closest('button[data-c]'); if(!b) return;
    docsCatFilter = b.dataset.c; renderDocs(main);
  });
  document.getElementById('addDocBtn').addEventListener('click', ()=>openDocForm(null));
  renderDocList();
}
function renderDocList(){
  const card = document.getElementById('docListCard'); if(!card) return;
  const items = state.documents.filter(d=>d.traveler===docsTravelerFilter && d.category===docsCatFilter);
  if(items.length===0){ card.innerHTML = `<div class="empty">No ${catInfo(docsCatFilter).label.toLowerCase()} saved yet for ${travelerName(docsTravelerFilter)}.</div>`; return; }
  card.innerHTML = items.map(d=>`
    <div class="doc-item" data-id="${d.id}">
      <div class="thumb placeholder" id="thumb-${d.id}">${catInfo(d.category).icon}</div>
      <div class="doc-info">
        <div class="t">${d.title || catInfo(d.category).label}</div>
        <div class="m">${d.date? fmtDate(d.date)+' · ':''}${d.refNumber || 'no reference #'}</div>
      </div>
      <button class="btn ghost view-doc" data-id="${d.id}">View</button>
    </div>
  `).join('');
  items.forEach(d=>{
    if(d.photoId){
      idbGet(d.photoId).then(blob=>{
        if(!blob) return;
        const url = URL.createObjectURL(blob);
        const el = document.getElementById('thumb-'+d.id);
        if(el){ el.classList.remove('placeholder'); el.innerHTML=''; const img=document.createElement('img'); img.src=url; img.className='thumb'; img.style.borderRadius='10px'; el.replaceWith(img); img.id='thumb-'+d.id; }
      });
    }
  });
  card.querySelectorAll('.view-doc').forEach(btn=>btn.addEventListener('click', ()=>{
    const doc = state.documents.find(x=>x.id===btn.dataset.id);
    openDocForm(doc);
  }));
}
function openDocForm(doc){
  const isEdit = !!doc;
  const cat = catInfo(docsCatFilter);
  const bg = document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <button class="close-x" id="closeModal">✕</button>
      <h3>${isEdit? 'Edit':'Add'} ${cat.label} — ${travelerName(docsTravelerFilter)}</h3>
      <label class="field">Title / label</label>
      <input id="f_title" value="${doc?.title||''}" placeholder="e.g. Air Canada YYC→YYZ">
      <label class="field">Date</label>
      <input id="f_date" type="date" value="${doc?.date||''}">
      <label class="field">Reference / confirmation #</label>
      <input id="f_ref" value="${doc?.refNumber||''}" placeholder="Booking / PNR / passport #">
      <label class="field">Notes</label>
      <textarea id="f_notes" placeholder="Seat #, hotel address, gate, etc.">${doc?.notes||''}</textarea>
      <label class="field">Photo (passport page, ticket, confirmation email)</label>
      <input id="f_photo" type="file" accept="image/*" capture="environment">
      <div id="photoPreviewWrap"></div>
      <div class="modal-actions">
        ${isEdit? '<button class="btn danger" id="deleteDoc">Delete</button>' : ''}
        <button class="btn secondary" id="cancelDoc">Cancel</button>
        <button class="btn" id="saveDoc">Save</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  if(doc?.photoId){
    idbGet(doc.photoId).then(blob=>{
      if(blob){ const url = URL.createObjectURL(blob); document.getElementById('photoPreviewWrap').innerHTML = `<img src="${url}" style="width:100%;border-radius:10px;margin-top:8px;">`; }
    });
  }
  bg.querySelector('#closeModal').onclick = ()=>bg.remove();
  bg.querySelector('#cancelDoc').onclick = ()=>bg.remove();
  if(isEdit){
    bg.querySelector('#deleteDoc').onclick = async ()=>{
      if(doc.photoId) await idbDelete(doc.photoId);
      state.documents = state.documents.filter(x=>x.id!==doc.id);
      saveState(); bg.remove(); renderDocList(); showToast('Deleted');
    };
  }
  bg.querySelector('#saveDoc').onclick = async ()=>{
    const title = document.getElementById('f_title').value.trim();
    const date = document.getElementById('f_date').value;
    const ref = document.getElementById('f_ref').value.trim();
    const notes = document.getElementById('f_notes').value.trim();
    const fileInput = document.getElementById('f_photo');
    let photoId = doc?.photoId || null;
    if(fileInput.files && fileInput.files[0]){
      const blob = await resizeImage(fileInput.files[0]);
      photoId = photoId || uid();
      await idbPut(photoId, blob);
    }
    if(isEdit){
      Object.assign(doc, {title, date, refNumber:ref, notes, photoId});
    } else {
      state.documents.push({id:uid(), traveler:docsTravelerFilter, category:docsCatFilter, title, date, refNumber:ref, notes, photoId});
    }
    saveState(); bg.remove(); renderDocList(); showToast('Saved');
  };
}
/* ============ DESTINATION GUIDES ============ */
function renderDestGuides(main){
  main.innerHTML = `<h2 class="section-title">Destination guides</h2>` + DEST_GUIDES.map(g=>`
    <div class="card">

/* ============ VIRTUAL TOURS ============ */
let player = { stops:[], index:0, playing:false, guideKey:null };
function renderTours(main){
  main.innerHTML = `<h2 class="section-title">Virtual walking tours</h2>
  <p class="muted" style="margin-top:-6px">Tap a guide, then hit play — your phone's built-in voice will read the stops aloud as you walk through the attraction. Works fully offline.</p>
  ` + GUIDES.map(g=>`
    <div class="card" style="cursor:pointer" onclick="openGuide('${g.key}')">
      <div class="row"><h3 style="margin:0;font-size:16px;color:var(--deep)">${g.emoji} ${g.title}</h3><span class="pill blue">${g.minutes}</span></div>
      <div class="muted">📍 ${g.loc} · ${g.stops.length} stops</div>
    </div>
  `).join('');
}
function openGuide(key){
  const g = GUIDES.find(x=>x.key===key);
  window.speechSynthesis && window.speechSynthesis.cancel();
  player = { stops:g.stops, index:0, playing:false, guideKey:key };
  const main = document.getElementById('main');
  main.innerHTML = `
    <button class="btn ghost" onclick="renderTours(document.getElementById('main'))">‹ All tours</button>
    <h2 class="section-title" style="margin-top:8px">${g.emoji} ${g.title}</h2>
    <p class="muted" style="margin-top:-8px">📍 ${g.loc}</p>
    <div class="card" id="stopsCard">${g.stops.map((s,i)=>`
      <div class="guide-stop" id="stop-${i}">
        <h4>${i+1}. ${s.h}</h4>
        <p>${s.t}</p>
      </div>`).join('')}
    </div>
    <div class="player-bar">
      <button id="prevBtn" title="Previous">⏮</button>
      <button id="playBtn" class="big" title="Play/Pause">▶</button>
      <button id="stopBtn" title="Stop">⏹</button>
      <button id="nextBtn" title="Next">⏭</button>
    </div>
  `;
  document.getElementById('playBtn').onclick = togglePlay;
  document.getElementById('stopBtn').onclick = stopGuideAudio;
  document.getElementById('nextBtn').onclick = ()=>jumpStop(1);
  document.getElementById('prevBtn').onclick = ()=>jumpStop(-1);
  highlightStop(0);
}
function highlightStop(i){
  document.querySelectorAll('.guide-stop').forEach((el,idx)=>el.classList.toggle('current', idx===i));
  const el = document.getElementById('stop-'+i);
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function speakStop(){
  if(!('speechSynthesis' in window)){ showToast('Voice playback not supported on this browser'); return; }
  if(player.index >= player.stops.length){ player.playing=false; updatePlayIcon(); return; }
  const s = player.stops[player.index];
  const utter = new SpeechSynthesisUtterance(s.t);
  utter.rate = 0.95;
  utter.onend = ()=>{ if(player.playing){ player.index++; highlightStop(player.index); speakStop(); } };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}
function togglePlay(){
  if(!('speechSynthesis' in window)){ showToast('Voice playback not supported on this browser'); return; }
  if(player.playing){
    player.playing = false;
    window.speechSynthesis.pause();
  } else {
    player.playing = true;
    if(window.speechSynthesis.paused){ window.speechSynthesis.resume(); }
    else { highlightStop(player.index); speakStop(); }
  }
  updatePlayIcon();
}
function stopGuideAudio(){
  player.playing=false; player.index=0;
  window.speechSynthesis && window.speechSynthesis.cancel();
  highlightStop(0); updatePlayIcon();
}
function jumpStop(delta){
  window.speechSynthesis && window.speechSynthesis.cancel();
  player.index = Math.max(0, Math.min(player.stops.length-1, player.index+delta));
  highlightStop(player.index);
  if(player.playing) speakStop();
}
function updatePlayIcon(){
  const btn = document.getElementById('playBtn'); if(!btn) return;
  btn.textContent = player.playing ? '⏸' : '▶';
}
/* ============ INFO (checklist, emergency, backup) ============ */
function renderInfo(main){
  main.innerHTML = `
    <h2 class="section-title">Packing checklist</h2>
    <div class="card" id="checklistCard">
      ${PACKING.map((item,i)=>{
        const key = 'pk'+i;
        const checked = !!state.checklist[key];
        return `<label class="checklist-item ${checked?'checked':''}"><input type="checkbox" data-key="${key}" ${checked?'checked':''}><span>${item}</span></label>`;
      }).join('')}
    </div>
    <h2 class="section-title">Emergency & embassy info</h2>
    <div class="card info-block">
      <p><b>Rising Star Outreach (Bihar contact)</b> — add your on-the-ground contact name/number here once confirmed.</p>
      <h4>India</h4>
      <ul>
        <li>Canadian High Commission, New Delhi — +91 11 4178 2000</li>
        <li>US Embassy, New Delhi — +91 11 2419 8000</li>
        <li>National emergency number (police/fire/medical): 112</li>
      </ul>
      <h4>Egypt</h4>
      <ul>
        <li>Canadian Embassy, Cairo — +20 2 2461 2200</li>
        <li>US Embassy, Cairo — +20 2 2797 3300</li>
        <li>Tourist & Antiquities Police: 126 · General emergency: 122</li>
      </ul>
      <p class="muted">Double-check these numbers closer to departure — save them directly into each traveler's phone contacts too.</p>
    </div>
    <h2 class="section-title">Quick reference</h2>
    <div class="card info-block">
      <h4>Electrical plugs</h4>
      <p>India: Type C/D/M, 230V · Egypt: Type C/F, 220V. A universal adapter with USB ports covers both — devices marked "INPUT 100-240V" don't need a voltage converter.</p>
      <h4>Currency</h4>
      <p>India: Indian Rupee (INR), cash useful outside big cities. Egypt: Egyptian Pound (EGP), but most attractions and hotels are card-only in 2026 — bring Visa/Mastercard and keep small EGP notes for tips.</p>
    </div>
    <h2 class="section-title">Backup your data</h2>
    <div class="card">
      <p class="muted" style="margin-top:0">Every phone stores its own copy of documents and notes. Use Export to save a backup file (including photos), and Import to load it on another device or restore it later.</p>
      <div class="modal-actions" style="margin-top:10px">
        <button class="btn secondary" id="exportBtn">⬇ Export backup</button>
        <button class="btn" id="importBtn">⬆ Import backup</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
  `;
  document.getElementById('checklistCard').addEventListener('change', e=>{
    const input = e.target.closest('input[type=checkbox]'); if(!input) return;
    state.checklist[input.dataset.key] = input.checked;
    saveState();
    input.closest('.checklist-item').classList.toggle('checked', input.checked);
  });
  document.getElementById('exportBtn').onclick = exportBackup;
  document.getElementById('importBtn').onclick = ()=>document.getElementById('importFile').click();
  document.getElementById('importFile').addEventListener('change', e=>{
    if(e.target.files[0]) importBackup(e.target.files[0]);
  });
}
async function exportBackup(){
  showToast('Preparing backup…');
  const docsWithPhotos = await Promise.all(state.documents.map(async doc=>{
    if(doc.photoId){
      const blob = await idbGet(doc.photoId);
      const photoData = blob ? await blobToBase64(blob) : null;
      return {...doc, photoData};
    }
    return doc;
  }));
  const bundle = {...state, documents:docsWithPhotos, exportedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(bundle)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `family-travel-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}
async function importBackup(file){
  try{
    const text = await file.text();
    const bundle = JSON.parse(text);
    const docs = await Promise.all((bundle.documents||[]).map(async doc=>{
      if(doc.photoData){
        const blob = dataURLToBlob(doc.photoData);
        const photoId = doc.photoId || uid();
        await idbPut(photoId, blob);
        const {photoData, ...rest} = doc;
        return {...rest, photoId};
      }
      return doc;
    }));
    state = { documents:docs, checklist:bundle.checklist||{}, seenWelcome:true };
    saveState();
    showToast('Backup imported');
    render();
  }catch(err){
    showToast('Could not read that backup file');
  }
}
/* ============ INIT ============ */
render();
</script>
